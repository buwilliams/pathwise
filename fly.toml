# fly.toml app configuration file generated for pathwiseai on 2026-05-03T17:30:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pathwiseai'
primary_region = 'ord'

[build]

[env]
  PATHWISE_DATA_DIR = '/data'

[[mounts]]
  source = 'pathwise_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
