# Fly app config. Replace `app` with the name you pick at `fly launch`,
# and `primary_region` with your nearest region (e.g. ord, iad, sjc, lhr).
app = "pathwise"
primary_region = "ord"

[build]
  # Uses the Dockerfile in this directory.

[env]
  PATHWISE_DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  # We DON'T auto-stop machines: background plan-job threads run for 2-4
  # minutes after a 202-Accepted response and would die mid-run if the
  # machine slept. If cost matters more than that, flip this on but be
  # aware in-flight plans will be lost.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# Persistent volume for the flat-file store (data/users, data/auth).
# Create the volume once before first deploy:
#   fly volumes create pathwise_data --size 1 --region <your-region>
[[mounts]]
  source = "pathwise_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
